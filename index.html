<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Inter, Arial, sans-serif;
    min-height:100vh;
    background:
        radial-gradient(circle at top left,#3b82f6,transparent 30%),
        radial-gradient(circle at bottom right,#8b5cf6,transparent 30%),
        #0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    width:90%;
    max-width:900px;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.time{
    font-size:72px;
    font-weight:700;
}

.date{
    opacity:.8;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    transition:.3s;
}

.box:hover{
    transform:translateY(-5px);
}

.box h3{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

ul{
    list-style:none;
    margin-top:10px;
}

li{
    margin-top:8px;
    background:rgba(255,255,255,0.08);
    padding:10px;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="card">

    <div class="header">
        <div>
            <div class="time" id="clock"></div>
            <div class="date" id="date"></div>
        </div>

        <div>
            <h2>👋 Привет!</h2>
            <p>Мой Dashboard</p>
        </div>
    </div>

    <div class="grid">

        <div class="box">
            <h3>📌 Задачи</h3>

            <input id="taskInput" placeholder="Новая задача">

            <button onclick="addTask()">Добавить</button>

            <ul id="tasks"></ul>
        </div>

        <div class="box">
            <h3>📊 Статистика</h3>
            <p>Всего задач:</p>
            <h1 id="count">0</h1>
        </div>

        <div class="box">
            <h3>🚀 Цель</h3>
            <p>
                Стать Fullstack разработчиком
            </p>
        </div>

    </div>

</div>

<script>

function updateClock(){
    const now = new Date();

    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString("ru-RU");

    document.getElementById("date").innerHTML =
        now.toLocaleDateString("ru-RU",{
            weekday:'long',
            day:'numeric',
            month:'long',
            year:'numeric'
        });
}

setInterval(updateClock,1000);
updateClock();

let tasks =
    JSON.parse(localStorage.getItem("tasks")) || [];

function renderTasks(){

    const list =
        document.getElementById("tasks");

    list.innerHTML="";

    tasks.forEach(task=>{

        const li =
            document.createElement("li");

        li.textContent=task;

        list.appendChild(li);
    });

    document.getElementById("count").textContent =
        tasks.length;

    localStorage.setItem(
        "tasks",
        JSON.stringify(tasks)
    );
}

function addTask(){

    const input =
        document.getElementById("taskInput");

    if(input.value.trim()){

        tasks.push(input.value);

        input.value="";

        renderTasks();
    }
}

renderTasks();

</script>

</body>
</html>
